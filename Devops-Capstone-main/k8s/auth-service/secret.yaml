# NEVER commit real values here.
# Before applying, generate real base64 values:
#   echo -n "your-actual-shared-secret" | base64
#   echo -n "postgresql://marketly:PASS@RDS_ENDPOINT:5432/auth_db" | base64
#
# Easiest approach — kubectl generates the base64 for you:
#   kubectl create secret generic auth-service-secret \
#     --from-literal=SHARED_SECRET="your-secret" \
#     --from-literal=DATABASE_URL="postgresql://marketly:PASS@RDS_ENDPOINT:5432/auth_db" \
#     -n marketly --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: marketly
type: Opaque
data:
  # Replace with: echo -n "your-secret" | base64
  SHARED_SECRET: REPLACE_WITH_BASE64
  # Replace with: echo -n "postgresql://marketly:PASS@RDS_HOST:5432/auth_db" | base64
  DATABASE_URL: REPLACE_WITH_BASE64