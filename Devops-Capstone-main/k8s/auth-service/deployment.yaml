apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: marketly
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 557541683666.dkr.ecr.us-east-1.amazonaws.com/marketly/auth-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: SHARED_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: DATABASE_URL
            - name: COOKIE_SECURE
              value: "false"   # set to "true" once you have HTTPS on the ALB
            - name: CORS_ALLOWED_ORIGIN
              value: "http://$(ALB_DNS)"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3