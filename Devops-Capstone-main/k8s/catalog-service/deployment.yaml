apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: marketly
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          # Replace YOUR_ACCOUNT_ID and YOUR_REGION with real values,
          # or let your CI/CD pipeline substitute the image tag.
          image: 557541683666.dkr.ecr.us-east-1.amazonaws.com/marketly/catalog-service:latest
          ports:
            - containerPort: 5002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: catalog-service-secret
                  key: DATABASE_URL
            - name: SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: catalog-service-secret
                  key: SHARED_SECRET
            - name: CORS_ALLOWED_ORIGIN
              value: "http://$(ALB_DNS)"   # overridden at deploy time or set to ALB DNS
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3