apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
  namespace: marketly
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders-service
          image: 557541683666.dkr.ecr.us-east-1.amazonaws.com/marketly/orders-service:latest
          ports:
            - containerPort: 5003
          env:
            - name: SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: orders-service-secret
                  key: SHARED_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orders-service-secret
                  key: DATABASE_URL
            - name: CORS_ALLOWED_ORIGIN
              value: "http://$(ALB_DNS)"
            # In-cluster DNS name — orders calls catalog by service name, not IP
            - name: CATALOG_SERVICE_URL
              value: "http://catalog-service.marketly.svc.cluster.local:5002"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3