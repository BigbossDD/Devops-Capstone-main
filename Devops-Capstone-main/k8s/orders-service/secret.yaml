# SHARED_SECRET MUST be the exact same value as in auth-service-secret.
# Orders-service verifies JWTs locally with this secret — if they differ,
# every order request returns 401.
apiVersion: v1
kind: Secret
metadata:
  name: orders-service-secret
  namespace: marketly
type: Opaque
data:
  # Must be IDENTICAL to auth-service-secret SHARED_SECRET
  SHARED_SECRET: REPLACE_WITH_BASE64
  # Replace with: echo -n "postgresql://marketly:PASS@RDS_HOST:5432/orders_db" | base64
  DATABASE_URL: REPLACE_WITH_BASE64