name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"   # only run when terraform files change
  push:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  id-token: write     # OIDC
  contents: read
  pull-requests: write  # so the job can comment the plan on the PR

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true   # warn but don't fail on formatting

      # ── Pull request: plan only, post result as a PR comment ──────────────
      - name: Terraform plan
        id: plan
        if: github.event_name == 'pull_request'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_k3s_token:   ${{ secrets.TF_VAR_K3S_TOKEN }}
          TF_VAR_github_repo: ${{ github.repository }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true   # capture output even if plan fails

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Plan status: ${{ steps.plan.outcome }}*
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: exit 1

      # ── Push to main: apply ───────────────────────────────────────────────
      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_k3s_token:   ${{ secrets.TF_VAR_K3S_TOKEN }}
          TF_VAR_github_repo: ${{ github.repository }}
        run: terraform apply -auto-approve