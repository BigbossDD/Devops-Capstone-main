name: CI — Build & Push Images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC token generation
  contents: read

env:
  AWS_REGION: us-east-1   # change if your region differs

jobs:
  # ── Run basic tests for each Python service ─────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, catalog-service, orders-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Smoke test — import app and hit /health
        working-directory: services/${{ matrix.service }}
        env:
          # Use SQLite fallback so tests don't need a real Postgres
          DATABASE_URL: ""
          SHARED_SECRET: "test-secret"
          CATALOG_SERVICE_URL: "http://localhost:5002"
        run: |
          python -c "import app; print('import ok')"

  # ── Build all 4 Docker images ────────────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test   # only build if tests pass

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate a unique image tag: short git SHA so each commit
      # gets its own tag and you can roll back to any previous build.
      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # Authenticate to AWS using the OIDC role created by modules/iam-oidc.
      # No static AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY ever stored.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push all 4 images in parallel using a matrix would require
      # separate jobs; doing them sequentially here keeps the workflow simple.
      - name: Build & push auth-service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/marketly/auth-service:$IMAGE_TAG \
            -t $ECR_REGISTRY/marketly/auth-service:latest \
            ./services/auth-service
          # Only push on merge to main — PRs just build to verify the Dockerfile
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/marketly/auth-service:$IMAGE_TAG
            docker push $ECR_REGISTRY/marketly/auth-service:latest
          fi

      - name: Build & push catalog-service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/marketly/catalog-service:$IMAGE_TAG \
            -t $ECR_REGISTRY/marketly/catalog-service:latest \
            ./services/catalog-service
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/marketly/catalog-service:$IMAGE_TAG
            docker push $ECR_REGISTRY/marketly/catalog-service:latest
          fi

      - name: Build & push orders-service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/marketly/orders-service:$IMAGE_TAG \
            -t $ECR_REGISTRY/marketly/orders-service:latest \
            ./services/orders-service
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/marketly/orders-service:$IMAGE_TAG
            docker push $ECR_REGISTRY/marketly/orders-service:latest
          fi

      - name: Build & push frontend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            --build-arg VITE_AUTH_URL=${{ secrets.ALB_URL }} \
            --build-arg VITE_CATALOG_URL=${{ secrets.ALB_URL }} \
            --build-arg VITE_ORDERS_URL=${{ secrets.ALB_URL }} \
            -t $ECR_REGISTRY/marketly/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/marketly/frontend:latest \
            ./frontend
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/marketly/frontend:$IMAGE_TAG
            docker push $ECR_REGISTRY/marketly/frontend:latest
          fi