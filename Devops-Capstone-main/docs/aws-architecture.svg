<svg viewBox="0 0 1300 950" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="650" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">DevOps Capstone — Free-Tier AWS Architecture</text>
  <text x="650" y="54" text-anchor="middle" font-size="13" fill="#666">Self-managed Kubernetes (k3s) on EC2 — no EKS control-plane fee</text>

  <!-- GitHub Actions box -->
  <rect x="40" y="75" width="190" height="60" rx="8" fill="#24292e"/>
  <text x="135" y="100" text-anchor="middle" font-size="13" fill="white" font-weight="600">GitHub Actions</text>
  <text x="135" y="118" text-anchor="middle" font-size="11" fill="#ccc">CI build/push + CD via</text>
  <text x="135" y="131" text-anchor="middle" font-size="11" fill="#ccc">self-hosted runner</text>

  <!-- OIDC arrow to AWS cloud -->
  <line x1="230" y1="105" x2="330" y2="105" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="97" text-anchor="middle" font-size="10" fill="#444">OIDC (no static keys)</text>

  <!-- ECR box -->
  <rect x="40" y="160" width="190" height="55" rx="8" fill="#7d4a9b"/>
  <text x="135" y="182" text-anchor="middle" font-size="12" fill="white" font-weight="600">Amazon ECR</text>
  <text x="135" y="198" text-anchor="middle" font-size="10" fill="#eee">4 repos: auth / catalog /</text>
  <text x="135" y="210" text-anchor="middle" font-size="10" fill="#eee">orders / frontend</text>
  <line x1="135" y1="135" x2="135" y2="160" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S3 box -->
  <rect x="40" y="240" width="190" height="55" rx="8" fill="#3f8624"/>
  <text x="135" y="262" text-anchor="middle" font-size="12" fill="white" font-weight="600">Amazon S3</text>
  <text x="135" y="278" text-anchor="middle" font-size="10" fill="#eee">Terraform remote state +</text>
  <text x="135" y="290" text-anchor="middle" font-size="10" fill="#eee">DB backups</text>

  <!-- AWS Cloud big dashed box -->
  <rect x="330" y="70" width="930" height="850" rx="14" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="345" y="92" font-size="13" fill="#666" font-weight="600">AWS Cloud (one account/region)</text>

  <!-- VPC box -->
  <rect x="355" y="105" width="880" height="780" rx="12" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="375" y="128" font-size="13" fill="#1d4ed8" font-weight="700">VPC — 10.0.0.0/16</text>

  <!-- Internet Gateway -->
  <rect x="760" y="140" width="140" height="40" rx="6" fill="#0f62fe"/>
  <text x="830" y="165" text-anchor="middle" font-size="12" fill="white" font-weight="600">Internet Gateway</text>

  <!-- Internet arrow -->
  <text x="1280" y="160" text-anchor="end" font-size="11" fill="#444">Internet / students</text>
  <line x1="1240" y1="160" x2="900" y2="160" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="830" y1="180" x2="830" y2="215" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Application Load Balancer -->
  <rect x="700" y="218" width="260" height="50" rx="8" fill="#ff9900"/>
  <text x="830" y="240" text-anchor="middle" font-size="13" fill="white" font-weight="700">Application Load Balancer</text>
  <text x="830" y="256" text-anchor="middle" font-size="10" fill="#fff4e0">internet-facing, spans both AZs</text>

  <!-- Route table label public -->
  <rect x="375" y="280" width="180" height="26" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="465" y="297" text-anchor="middle" font-size="10" fill="#1d4ed8">Public Route Table → 0.0.0.0/0 → IGW</text>

  <!-- AZ A -->
  <rect x="375" y="315" width="420" height="540" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="4,3"/>
  <text x="385" y="335" font-size="12" fill="#475569" font-weight="700">Availability Zone A</text>

  <!-- AZ A public subnet -->
  <rect x="390" y="345" width="390" height="120" rx="8" fill="#fff7ed" stroke="#fb923c"/>
  <text x="400" y="362" font-size="11" fill="#9a3412" font-weight="600">Public Subnet A — 10.0.1.0/24</text>
  <rect x="405" y="372" width="150" height="75" rx="6" fill="#ff9900"/>
  <text x="480" y="398" text-anchor="middle" font-size="11" fill="white" font-weight="600">NAT Instance</text>
  <text x="480" y="413" text-anchor="middle" font-size="9" fill="#fff4e0">t3.micro, replaces</text>
  <text x="480" y="425" text-anchor="middle" font-size="9" fill="#fff4e0">paid NAT Gateway</text>
  <rect x="595" y="372" width="170" height="75" rx="6" fill="#ffead1" stroke="#fb923c"/>
  <text x="680" y="396" text-anchor="middle" font-size="10" fill="#7c2d12">SG: alb-sg</text>
  <text x="680" y="411" text-anchor="middle" font-size="9" fill="#7c2d12">allow 80/443</text>
  <text x="680" y="424" text-anchor="middle" font-size="9" fill="#7c2d12">from 0.0.0.0/0</text>

  <!-- AZ A private subnet -->
  <rect x="390" y="480" width="390" height="355" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="400" y="497" font-size="11" fill="#166534" font-weight="600">Private Subnet A — 10.0.11.0/24</text>

  <rect x="405" y="510" width="170" height="80" rx="6" fill="#ff9900"/>
  <text x="490" y="535" text-anchor="middle" font-size="11" fill="white" font-weight="600">EC2: k3s</text>
  <text x="490" y="550" text-anchor="middle" font-size="11" fill="white" font-weight="600">control-plane</text>
  <text x="490" y="565" text-anchor="middle" font-size="9" fill="#fff4e0">t3.small, SSM-managed</text>

  <rect x="585" y="510" width="180" height="80" rx="6" fill="#ffe9c2" stroke="#fb923c"/>
  <text x="675" y="533" text-anchor="middle" font-size="10" fill="#7c2d12">SG: k3s-sg</text>
  <text x="675" y="548" text-anchor="middle" font-size="9" fill="#7c2d12">NodePort 30000-32767</text>
  <text x="675" y="561" text-anchor="middle" font-size="9" fill="#7c2d12">from alb-sg only</text>
  <text x="675" y="574" text-anchor="middle" font-size="9" fill="#7c2d12">no public IP, no SSH key</text>

  <rect x="405" y="605" width="360" height="95" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-dasharray="3,2"/>
  <text x="585" y="622" text-anchor="middle" font-size="10" fill="#166534" font-weight="600">Auto Scaling Group — k3s workers (2-4x t3.micro)</text>
  <rect x="418" y="632" width="100" height="55" rx="6" fill="#22c55e"/>
  <text x="468" y="655" text-anchor="middle" font-size="9" fill="white">worker-1</text>
  <text x="468" y="668" text-anchor="middle" font-size="8" fill="#e7ffe9">NodePort</text>
  <rect x="530" y="632" width="100" height="55" rx="6" fill="#22c55e"/>
  <text x="580" y="655" text-anchor="middle" font-size="9" fill="white">worker-2</text>
  <text x="580" y="668" text-anchor="middle" font-size="8" fill="#e7ffe9">NodePort</text>
  <rect x="642" y="632" width="100" height="55" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-dasharray="3,2"/>
  <text x="692" y="655" text-anchor="middle" font-size="9" fill="#166534">worker-N</text>
  <text x="692" y="668" text-anchor="middle" font-size="8" fill="#166534">scales w/ CPU</text>

  <rect x="405" y="715" width="360" height="105" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="585" y="733" text-anchor="middle" font-size="11" fill="#075985" font-weight="600">Amazon RDS — PostgreSQL</text>
  <text x="585" y="749" text-anchor="middle" font-size="9" fill="#075985">db.t3.micro, single-AZ, 20GB</text>
  <text x="585" y="763" text-anchor="middle" font-size="9" fill="#075985">replaces SQLite so workers</text>
  <text x="585" y="777" text-anchor="middle" font-size="9" fill="#075985">share one consistent datastore</text>
  <rect x="455" y="788" width="260" height="22" rx="4" fill="#bae6fd"/>
  <text x="585" y="803" text-anchor="middle" font-size="9" fill="#075985">SG: rds-sg — allow 5432 from k3s-sg only</text>

  <!-- AZ B -->
  <rect x="815" y="315" width="400" height="540" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="4,3"/>
  <text x="825" y="335" font-size="12" fill="#475569" font-weight="700">Availability Zone B</text>

  <rect x="830" y="345" width="370" height="120" rx="8" fill="#fff7ed" stroke="#fb923c"/>
  <text x="840" y="362" font-size="11" fill="#9a3412" font-weight="600">Public Subnet B — 10.0.2.0/24</text>
  <text x="840" y="385" font-size="9" fill="#9a3412">ALB elastic network interface</text>
  <text x="840" y="398" font-size="9" fill="#9a3412">(2nd AZ for ALB high availability —</text>
  <text x="840" y="411" font-size="9" fill="#9a3412">required by AWS, costs nothing extra)</text>

  <rect x="830" y="480" width="370" height="355" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="840" y="497" font-size="11" fill="#166534" font-weight="600">Private Subnet B — 10.0.12.0/24</text>
  <text x="840" y="520" font-size="9" fill="#166534">More ASG workers can land here too —</text>
  <text x="840" y="533" font-size="9" fill="#166534">the ASG spans both private subnets so a</text>
  <text x="840" y="546" font-size="9" fill="#166534">single AZ outage doesn't kill the cluster.</text>

  <rect x="840" y="565" width="340" height="80" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-dasharray="3,2"/>
  <text x="1010" y="588" text-anchor="middle" font-size="10" fill="#075985" font-weight="600">RDS Subnet Group</text>
  <text x="1010" y="603" text-anchor="middle" font-size="9" fill="#075985">spans Private Subnet A + B</text>
  <text x="1010" y="616" text-anchor="middle" font-size="9" fill="#075985">(required by RDS even single-AZ)</text>

  <!-- Private route table label -->
  <rect x="840" y="660" width="320" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="1000" y="676" text-anchor="middle" font-size="10" fill="#166534">Private Route Table → 0.0.0.0/0 → NAT Instance</text>
  <text x="1000" y="690" text-anchor="middle" font-size="9" fill="#166534">(workers pull images from ECR via NAT)</text>

  <!-- arrows: ALB -> workers -->
  <line x1="830" y1="268" x2="490" y2="510" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="830" y1="268" x2="585" y2="632" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="700" y="300" font-size="9" fill="#444">target group → NodePort on every k3s node</text>

  <!-- arrow workers -> RDS -->
  <line x1="585" y1="700" x2="585" y2="715" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- legend / cost box -->
  <rect x="40" y="700" width="260" height="220" rx="10" fill="#fefce8" stroke="#ca8a04"/>
  <text x="55" y="722" font-size="12" fill="#854d0e" font-weight="700">Free-tier notes (first 12 months)</text>
  <text x="55" y="744" font-size="10" fill="#713f12">• EC2 t3.micro: 750 hrs/mo free</text>
  <text x="55" y="760" font-size="10" fill="#713f12">  (control-plane + workers share this pool)</text>
  <text x="55" y="780" font-size="10" fill="#713f12">• RDS db.t3.micro: 750 hrs/mo + 20GB free</text>
  <text x="55" y="800" font-size="10" fill="#713f12">• ALB: 750 hrs/mo free</text>
  <text x="55" y="820" font-size="10" fill="#713f12">• NAT Instance (not NAT Gateway) avoids</text>
  <text x="55" y="836" font-size="10" fill="#713f12">  the ~$32/mo managed NAT Gateway fee</text>
  <text x="55" y="856" font-size="10" fill="#713f12">• No EKS control plane (~$73/mo) — k3s</text>
  <text x="55" y="872" font-size="10" fill="#713f12">  is self-managed on free-tier EC2</text>
  <text x="55" y="892" font-size="10" fill="#b91c1c" font-weight="600">• Run scripts/teardown.sh when not</text>
  <text x="55" y="908" font-size="10" fill="#b91c1c" font-weight="600">  actively working — only RDS+S3 storage</text>
  <text x="55" y="920" font-size="10" fill="#b91c1c" font-weight="600">  bytes ever bill after that.</text>
</svg>
